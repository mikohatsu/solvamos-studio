# CI: 코드 리뷰(타입체크) → 빌드 테스트 → (main만) Cloud Run 배포
# 인증: GitHub Variables WIF_PROVIDER + WIF_SERVICE_ACCOUNT (키 생성 불가 Org용)
# 런북: SOLANA docs/CICD_CLOUDRUN.md

name: CI / Deploy Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: project-64269e62-555d-4979-88e
  REGION: asia-northeast3
  AR_REPO: solvamos-img
  SERVICE: solvamos-studio
  TIER: starter
  NODE_VERSION: "24"

jobs:
  # ── 1) 코드 리뷰 게이트 (타입체크 + 시크릿 파일 가드) ─────────────
  review:
    name: Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (lint)
        run: npm run lint

      - name: Guard committed secrets
        run: |
          set -euo pipefail
          bad=$(git ls-files | grep -E '(^|/)\.env$|\.pem$|credentials\.json$|github-deploy-key\.json$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Secret-like files must not be committed:"
            echo "$bad"
            exit 1
          fi
          echo "No secret-like tracked files."

      - name: Review summary
        run: |
          {
            echo "### Review"
            echo "- Typecheck (\`tsc --noEmit\`): pass"
            echo "- Secret file guard: pass"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 2) 빌드 테스트 (Vite + server 번들 + Docker 이미지) ──────────
  build-test:
    name: Build test
    needs: [review]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: solvamos_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d solvamos_studio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Assert build artifacts
        run: |
          set -euo pipefail
          test -f dist/server.cjs
          test -d node_modules/.prisma/client
          test -d dist/client -o -d dist/assets -o -f dist/index.html \
            || ls -la dist
          echo "Artifacts OK:"
          ls -la dist | head -40
          ls -la node_modules/.prisma/client | head -20

      - name: Migrate CI Postgres
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/solvamos_studio?schema=public
        run: npx prisma migrate deploy

      - name: Docker build + boot smoke (PORT + real DB)
        env:
          DATABASE_URL: postgresql://ci:ci@host.docker.internal:5432/solvamos_studio?schema=public
        run: |
          set -euo pipefail
          IMAGE=solvamos-studio:ci-${{ github.sha }}
          docker build -t "${IMAGE}" .

          # Path A — production-like: real Postgres via host.docker.internal
          CID=$(docker run -d \
            --add-host=host.docker.internal:host-gateway \
            -e PORT=8080 \
            -e NODE_ENV=production \
            -e JWT_SECRET='ci-smoke-jwt-secret-at-least-32-chars!!' \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e GOOGLE_CLOUD_PROJECT='ci-project' \
            -e ALLOW_LOCAL_VAULT_FALLBACK=false \
            -e ALLOW_PAYMENT_BYPASS=false \
            -e PAYMENT_NETWORK=devnet \
            -p 18080:8080 \
            "${IMAGE}")
          cleanup() { docker logs "${CID}" || true; docker rm -f "${CID}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          ok=0
          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:18080/healthz" >/dev/null; then
              ok=1
              break
            fi
            # If container already exited, fail fast with logs
            if [ "$(docker inspect -f '{{.State.Running}}' "${CID}" 2>/dev/null || echo false)" != "true" ]; then
              echo "::error::Container exited before /healthz succeeded"
              exit 1
            fi
            sleep 1
          done
          if [ "${ok}" != "1" ]; then
            echo "::error::Container never answered /healthz on :8080 — see docker logs above"
            exit 1
          fi
          echo "Docker boot smoke OK (/healthz + Postgres)"

          # Path B — engines-only degraded smoke (dummy DB) must still listen
          docker rm -f "${CID}" >/dev/null 2>&1 || true
          trap - EXIT
          CID2=$(docker run -d \
            -e PORT=8080 \
            -e NODE_ENV=production \
            -e JWT_SECRET='ci-smoke-jwt-secret-at-least-32-chars!!' \
            -e DATABASE_URL='postgresql://ci:ci@127.0.0.1:1/ci?connect_timeout=1' \
            -e GOOGLE_CLOUD_PROJECT='ci-project' \
            -e ALLOW_LOCAL_VAULT_FALLBACK=false \
            -e ALLOW_PAYMENT_BYPASS=false \
            -e PAYMENT_NETWORK=devnet \
            -e BOOT_ALLOW_DEGRADED=true \
            -p 18081:8080 \
            "${IMAGE}")
          cleanup2() { docker logs "${CID2}" || true; docker rm -f "${CID2}" >/dev/null 2>&1 || true; }
          trap cleanup2 EXIT
          ok2=0
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null; then
              ok2=1
              break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' "${CID2}" 2>/dev/null || echo false)" != "true" ]; then
              echo "::error::Degraded smoke container exited before /healthz"
              exit 1
            fi
            sleep 1
          done
          if [ "${ok2}" != "1" ]; then
            echo "::error::Degraded smoke never answered /healthz"
            exit 1
          fi
          echo "Docker degraded smoke OK (/healthz without DB)"

      - name: Build summary
        run: |
          {
            echo "### Build test"
            echo "- \`npm run build\` + prisma generate: pass"
            echo "- Docker boot smoke (Postgres + degraded): pass"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 3) 배포 (main push / 수동만 · review+build 성공 필수) ───────
  deploy:
    name: Deploy Cloud Run
    needs: [review, build-test]
    if: >
      always() &&
      needs.review.result == 'success' &&
      needs.build-test.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply optional repo Variables
        run: |
          # empty vars must not fail the step (set -e + `&&` returns 1)
          if [ -n "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "PROJECT_ID=${{ vars.GCP_PROJECT_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.GCP_REGION }}" ]; then
            echo "REGION=${{ vars.GCP_REGION }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.GCP_AR_REPO }}" ]; then
            echo "AR_REPO=${{ vars.GCP_AR_REPO }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.GCP_SERVICE }}" ]; then
            echo "SERVICE=${{ vars.GCP_SERVICE }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.GCP_TIER }}" ]; then
            echo "TIER=${{ vars.GCP_TIER }}" >> "$GITHUB_ENV"
          fi
          echo "Using PROJECT_ID=${PROJECT_ID} REGION=${REGION} SERVICE=${SERVICE}"

      - name: Short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Require GCP auth config
        run: |
          if [ -z "${{ vars.WIF_PROVIDER }}" ] || [ -z "${{ vars.WIF_SERVICE_ACCOUNT }}" ]; then
            if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
              echo "::error::Set repo Variables WIF_PROVIDER + WIF_SERVICE_ACCOUNT (or Secret GCP_SA_KEY) on THIS repository."
              echo "Actions is running on: ${{ github.repository }}"
              exit 1
            fi
            echo "Auth mode: SA key"
          else
            echo "Auth mode: WIF"
            echo "Provider set: yes"
            echo "SA: ${{ vars.WIF_SERVICE_ACCOUNT }}"
            echo "Repo: ${{ github.repository }}"
          fi

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        if: ${{ vars.WIF_PROVIDER != '' && vars.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Authenticate to Google Cloud (SA key fallback)
        id: auth-key
        if: ${{ vars.WIF_PROVIDER == '' || vars.WIF_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Export registry access token
        id: token
        run: |
          set -euo pipefail
          TOKEN="${{ steps.auth.outputs.access_token }}"
          if [ -z "${TOKEN}" ]; then
            TOKEN="${{ steps.auth-key.outputs.access_token }}"
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::GCP auth produced no access_token. Check WIF Variables on ${{ github.repository }} and pool attribute.repository binding."
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Docker login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.token.outputs.token }}

      - name: Ensure Artifact Registry repo exists
        run: |
          set -euo pipefail
          if ! gcloud artifacts repositories describe "${AR_REPO}" \
            --location="${REGION}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPO}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}"
          fi

      - name: Build and push image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/studio
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          set -euo pipefail
          docker build \
            -t "${IMAGE}:${SHA}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${SHA}"
          docker push "${IMAGE}:latest"
          echo "IMAGE_URI=${IMAGE}:${SHA}" >> "$GITHUB_ENV"

      - name: Resolve min instances
        id: tier
        run: |
          MIN=0
          case "${TIER}" in
            professional) MIN=1 ;;
            enterprise) MIN=2 ;;
          esac
          echo "min=${MIN}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          # --update-env-vars: merge only (do NOT use --set-env-vars — it wipes OAuth/APP_URL)
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --platform=managed \
            --image="${IMAGE_URI}" \
            --port=8080 \
            --allow-unauthenticated \
            --cpu-boost \
            --min-instances="${{ steps.tier.outputs.min }}" \
            --max-instances=20 \
            --add-cloudsql-instances="${PROJECT_ID}:${REGION}:solvamos-studio-pg" \
            --update-env-vars="NODE_ENV=production,CUSTOMER_TIER=${TIER},ALLOW_LOCAL_VAULT_FALLBACK=false,ALLOW_PAYMENT_BYPASS=false,ALLOW_ADC_DRIVE=false,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},PAYMENT_NETWORK=devnet"

      - name: Bind runtime URL + OAuth secrets (preserve across deploys)
        env:
          GOOGLE_CLIENT_ID_VAR: ${{ vars.GOOGLE_CLIENT_ID }}
          PROJECT_NUMBER_VAR: ${{ vars.GCP_PROJECT_NUMBER }}
        run: |
          set -euo pipefail
          # Prefer Variable / known Lab number — avoids cloudresourcemanager API on CI SA
          PROJECT_NUMBER="${PROJECT_NUMBER_VAR:-74094114833}"
          URL="https://${SERVICE}-${PROJECT_NUMBER}.${REGION}.run.app"

          UPDATE_ENV="APP_URL=${URL},OAUTH_REDIRECT_URI=${URL}/api/auth/google/callback"
          if [ -n "${GOOGLE_CLIENT_ID_VAR}" ]; then
            UPDATE_ENV="${UPDATE_ENV},GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID_VAR}"
          fi

          SECRET_FLAGS=()
          if gcloud secrets describe google-client-secret --project="${PROJECT_ID}" >/dev/null 2>&1; then
            SECRET_FLAGS+=("GOOGLE_CLIENT_SECRET=google-client-secret:latest")
          fi
          if gcloud secrets describe gemini-api-key --project="${PROJECT_ID}" >/dev/null 2>&1; then
            SECRET_FLAGS+=("GEMINI_API_KEY=gemini-api-key:latest")
          fi
          # Required for production boot (assertProductionSafety + Prisma)
          missing_required=0
          if gcloud secrets describe jwt-secret --project="${PROJECT_ID}" >/dev/null 2>&1; then
            SECRET_FLAGS+=("JWT_SECRET=jwt-secret:latest")
          else
            echo "::error::Secret Manager missing jwt-secret — create it (>=32 chars) or Cloud Run will crash on boot"
            missing_required=1
          fi
          if gcloud secrets describe database-url --project="${PROJECT_ID}" >/dev/null 2>&1; then
            SECRET_FLAGS+=("DATABASE_URL=database-url:latest")
          else
            echo "::error::Secret Manager missing database-url — create Cloud SQL URL secret or Cloud Run will crash on boot"
            missing_required=1
          fi
          if [ "${missing_required}" = "1" ]; then
            exit 1
          fi

          ARGS=(
            run services update "${SERVICE}"
            --project="${PROJECT_ID}"
            --region="${REGION}"
            --update-env-vars="${UPDATE_ENV}"
          )
          if [ ${#SECRET_FLAGS[@]} -gt 0 ]; then
            IFS=,
            ARGS+=(--update-secrets="${SECRET_FLAGS[*]}")
            unset IFS
          fi
          gcloud "${ARGS[@]}"

          echo "URL=${URL}" >> "$GITHUB_ENV"
          {
            echo "### Deployed"
            echo "- **URL:** ${URL}"
            echo "- **Health:** ${URL}/healthz"
            echo "- **Image:** \`${IMAGE_URI}\`"
            echo "- **Secrets:** JWT_SECRET + DATABASE_URL + OAuth/Gemini (if present)"
            if [ -z "${GOOGLE_CLIENT_ID_VAR}" ]; then
              echo "- **Note:** set repo Variable \`GOOGLE_CLIENT_ID\` so CI re-applies Client ID every deploy"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed: ${URL}"
